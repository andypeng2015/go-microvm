name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, name: Linux}
          - {os: macos-15, name: macOS}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests (excluding CGO packages)
        run: task test-nocgo

  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, name: Linux}
          - {os: macos-15, name: macOS}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m
        env:
          CGO_ENABLED: "0"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify compilation (pure Go packages)
        run: task build-nocgo

  build-cgo-linux:
    name: Build (Linux CGO)
    runs-on: ubuntu-latest
    env:
      # Force docker so the manifest check, local build, and build-runner
      # all use the same container storage. GitHub runners have docker.
      CONTAINER_RUNTIME: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Source versions.env
        run: |
          source versions.env
          echo "LIBKRUN_VERSION=${LIBKRUN_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The builder image is tagged by LIBKRUN_VERSION. When a PR bumps
      # LIBKRUN_VERSION, the image for that tag doesn't exist yet (it's
      # built by builder.yaml only after merge to main). Check the registry
      # and build locally if missing so CI can verify the bump.
      - name: Check if builder image exists
        id: check-builder
        run: |
          if docker manifest inspect ghcr.io/stacklok/go-microvm-builder:${LIBKRUN_VERSION} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build builder image locally
        if: steps.check-builder.outputs.exists == 'false'
        run: task builder-image-build

      - name: Build runner using builder container
        run: task build-runner

  build-cgo-macos:
    name: Build (macOS CGO)
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libkrun
        run: |
          brew tap slp/krun
          brew trust slp/krun
          brew install libkrun libkrunfw

      - name: Build and sign runner
        run: task build-dev-darwin
